<h1>教师端</h1>
<p>用于课程/评审场景的项目查看入口，聚焦“版本对比、发布记录、交互摘要”的阅读体验。</p>
<ol>
  <li>查看项目概览与关键指标（资源数、场景数、交互数、最近发布）。</li>
  <li>对比两个版本的变更摘要（资源替换、交互规则变更）。</li>
  <li>导出发布说明与清单，用于验收留痕。</li>
</ol>
